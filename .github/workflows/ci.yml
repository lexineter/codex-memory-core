name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test --all
        run: cargo test --all

      - name: ship
        run: ./scripts/ship.sh

      - name: verify bundle
        run: ./scripts/verify_bundle.sh dist/proof_bundle

      - name: deterministic bundle compare
        shell: bash
        run: |
          cp dist/proof_bundle/proof_manifest.json /tmp/proof_manifest_first.json
          cp dist/proof_bundle/SHA256SUMS.txt /tmp/sha_first.txt
          ./scripts/ship.sh
          cmp -s /tmp/proof_manifest_first.json dist/proof_bundle/proof_manifest.json
          cmp -s /tmp/sha_first.txt dist/proof_bundle/SHA256SUMS.txt
